<div class="h-full w-full lg:px-10 lg:py-4">
  <div id="title" class="text-start mb-4 w-full flex items-center justify-between">
    <div>
      <span class="text-4xl font-bold">
        Blog Posts
      </span>
      <p class="text-gray-400">Manage your {{blogPosts().length}} Posts</p>
    </div>
    <button routerLink="edit" class="rounded-lg px-4 py-2 text-white font-semibold hover:cursor-pointer bg-green-500">
       + Create New Post
    </button>
  </div>
  <div class="bg-white p-2 flex items-center justify-start gap-2 mb-3 rounded">
    <svg height="20px" width="20px" version="1.1" id="_x32_" xmlns="http://www.w3.org/2000/svg"
      xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" xml:space="preserve" fill="#000000">
      <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
      <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
      <g id="SVGRepo_iconCarrier">
        <style type="text/css">
          .st0 {
            fill: #000000;
          }
        </style>
        <g>
          <path class="st0"
            d="M332.998,291.918c52.2-71.895,45.941-173.338-18.834-238.123c-71.736-71.728-188.468-71.728-260.195,0 c-71.746,71.745-71.746,188.458,0,260.204c64.775,64.775,166.218,71.034,238.104,18.844l14.222,14.203l40.916-40.916 L332.998,291.918z M278.488,278.333c-52.144,52.134-136.699,52.144-188.852,0c-52.152-52.153-52.152-136.717,0-188.861 c52.154-52.144,136.708-52.144,188.852,0C330.64,141.616,330.64,226.18,278.488,278.333z">
          </path>
          <path class="st0"
            d="M109.303,119.216c-27.078,34.788-29.324,82.646-6.756,119.614c2.142,3.489,6.709,4.603,10.208,2.46 c3.49-2.142,4.594-6.709,2.462-10.198v0.008c-19.387-31.7-17.45-72.962,5.782-102.771c2.526-3.228,1.946-7.898-1.292-10.405 C116.48,115.399,111.811,115.979,109.303,119.216z">
          </path>
          <path class="st0"
            d="M501.499,438.591L363.341,315.178l-47.98,47.98l123.403,138.168c12.548,16.234,35.144,13.848,55.447-6.456 C514.505,474.576,517.743,451.138,501.499,438.591z">
          </path>
        </g>
      </g>
    </svg>
    <input (input)="onSearch($event)" class="bg-gray-100 rounded-lg outline-0 w-full px-2 py-1 placeholder:text-gray-500" placeholder="Search By Title" type="text" name="search" id="search">
  </div>
  <div id="table" class="w-full h-[70%] overflow-auto border border-gray-300 rounded bg-white ">
    <table class="table table-auto w-full h-full border-collapse">
      <thead class="border-b border-b-gray-500 text-gray-500 ">
        <th class="p-4">Title</th>
        <th>Category</th>
        <th>Date Created</th>
        <th>Date Updated</th>
        <th>Actions</th>
      </thead>
      <tbody>
        @for(post of copyPosts(); track $index) {
        <tr class="border-b text-center border-b-gray-400 ">
          <td class="font-semibold text-lg">
            {{post.TITLE}}
          </td>
          <td >
            <div class="flex flex-wrap gap-2 justify-center items-center">
              @for(category of post.CATEGORY; track $index) {
                <span class="rounded-full px-2 bg-yellow-400 text-purple-700 font-semibold text-sm">
                               {{category}}

                           </span>

              }
            </div>

          </td>
          <td>
            {{post.DATE_ADDED | date}}
          </td>
          <td>
            {{post.DATE_UPDATED | date}}
          </td>
          <td>
            <div class="flex items-center justify-center gap-2">
              <span routerLink="edit" [queryParams]="{slug:blogService.getSlug(post.TITLE ?? '')}"  class="text-green-600 hover:cursor-pointer">
                Edit
              </span>
              <span class="text-red-600 hover:cursor-pointer">
                Delete
              </span>
            </div>
          </td>

        </tr>
        }
      </tbody>
    </table>

  </div>
</div>
